services:
  postgres:
    image: postgres:15
    container_name: postgres-container
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - springboot-postgres-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  springboot-postgres-network:
    driver: bridge

volumes:
  postgres_data:
