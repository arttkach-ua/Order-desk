name: Deploy to k3s

on:
  push:
    branches:
      - main
      - master  # Keep for compatibility if branch is renamed
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

  build-and-deploy:
    name: Build Docker Image and Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for versioning

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build JAR with Gradle
        run: ./gradlew bootJar --no-daemon

      - name: Extract version information
        id: version
        run: |
          # Extract version from build.gradle
          VERSION=$(grep "version = " build.gradle | cut -d "'" -f 2)
          # Get short commit SHA
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Create full version tag
          FULL_VERSION="${VERSION}-${SHORT_SHA}"
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          
          echo "📦 Version: ${VERSION}"
          echo "🔖 Short SHA: ${SHORT_SHA}"
          echo "🏷️  Full Version Tag: ${FULL_VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.sha }}
            type=raw,value=${{ steps.version.outputs.full_version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl with k3s
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          
          # Test connection
          kubectl cluster-info
          kubectl get nodes

      - name: Create namespace if not exists
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Create database secret if not exists
        run: |
          # Check if secret exists
          if ! kubectl get secret postgres-secret -n orders-desk &> /dev/null; then
            echo "Creating postgres-secret..."
            kubectl create secret generic postgres-secret \
              --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
              --from-literal=DB_USERNAME=postgres \
              --from-literal=DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
              --from-literal=POSTGRES_DB=mydatabase \
              -n orders-desk
          else
            echo "postgres-secret already exists"
          fi

      - name: Update deployment manifest with new image
        run: |
          # Replace the image placeholder with actual image
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha }}"
          sed -i "s|image: ghcr.io/arttkach-ua/order-desk:latest|image: ${IMAGE_TAG}|g" k8s/app-deployment.yaml
          
          echo "📦 Updated deployment to use image: ${IMAGE_TAG}"
          
          # Show the updated section
          grep -A 5 "image:" k8s/app-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          echo "🚀 Applying Kubernetes manifests..."
          
          # Apply in correct order
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/postgres-pvc.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/app-configmap.yaml
          kubectl apply -f k8s/app-deployment.yaml
          kubectl apply -f k8s/app-service.yaml
          
          echo "✅ Manifests applied successfully"

      - name: Wait for PostgreSQL to be ready
        run: |
          echo "⏳ Waiting for PostgreSQL to be ready..."
          kubectl wait --for=condition=ready pod -l app=postgres -n orders-desk --timeout=300s || true
          kubectl get pods -n orders-desk

      - name: Wait for application deployment
        run: |
          echo "⏳ Waiting for application deployment to complete..."
          kubectl rollout status deployment/orders-app -n orders-desk --timeout=300s
          
          echo "✅ Deployment completed successfully"

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."
          echo ""
          echo "📊 Pods Status:"
          kubectl get pods -n orders-desk -o wide
          echo ""
          echo "🌐 Services:"
          kubectl get svc -n orders-desk
          echo ""
          echo "📦 Deployments:"
          kubectl get deployments -n orders-desk
          echo ""
          echo "🔖 Current Image Version:"
          kubectl get deployment orders-app -n orders-desk -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""

      - name: Get application URL
        run: |
          NODEPORT=$(kubectl get svc orders-service -n orders-desk -o jsonpath='{.spec.ports[0].nodePort}')
          echo "🌍 Application is accessible at: http://${{ secrets.K3S_HOST }}:${NODEPORT}"
          echo "📚 Swagger UI: http://${{ secrets.K3S_HOST }}:${NODEPORT}/swagger-ui.html"

      - name: Deployment summary
        run: |
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.full_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Access URLs:**" >> $GITHUB_STEP_SUMMARY
          NODEPORT=$(kubectl get svc orders-service -n orders-desk -o jsonpath='{.spec.ports[0].nodePort}')
          echo "- Application: http://${{ secrets.K3S_HOST }}:${NODEPORT}" >> $GITHUB_STEP_SUMMARY
          echo "- Swagger UI: http://${{ secrets.K3S_HOST }}:${NODEPORT}/swagger-ui.html" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pods Status:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n orders-desk >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

