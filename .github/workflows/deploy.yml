name: Deploy to k3s

on:
  push:
    branches:
      - main
      - master  # Keep for compatibility if branch is renamed
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

  build-and-deploy:
    name: Build Docker Image and Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for versioning

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build JAR with Gradle
        run: ./gradlew bootJar --no-daemon

      - name: Extract version information
        id: version
        run: |
          # Extract version from build.gradle
          VERSION=$(grep "version = " build.gradle | cut -d "'" -f 2)
          # Get short commit SHA
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Create full version tag
          FULL_VERSION="${VERSION}-${SHORT_SHA}"
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          
          echo "📦 Version: ${VERSION}"
          echo "🔖 Short SHA: ${SHORT_SHA}"
          echo "🏷️  Full Version Tag: ${FULL_VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.sha }}
            type=raw,value=${{ steps.version.outputs.full_version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Deploy to k3s via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.K3S_HOST }}
          username: root
          key: ${{ secrets.K3S_SSH_KEY }}
          envs: IMAGE_TAG,POSTGRES_PASSWORD
          script: |
            echo "🚀 Starting deployment to k3s..."
            
            # Create namespace if not exists
            sudo k3s kubectl apply -f - <<EOF
            apiVersion: v1
            kind: Namespace
            metadata:
              name: orders-desk
              labels:
                name: orders-desk
                environment: production
            EOF
            
            # Create database secret if not exists
            if ! sudo k3s kubectl get secret postgres-secret -n orders-desk &> /dev/null; then
              echo "Creating postgres-secret..."
              sudo k3s kubectl create secret generic postgres-secret \
                --from-literal=POSTGRES_PASSWORD=${POSTGRES_PASSWORD} \
                --from-literal=DB_USERNAME=postgres \
                --from-literal=DB_PASSWORD=${POSTGRES_PASSWORD} \
                --from-literal=POSTGRES_DB=mydatabase \
                -n orders-desk
            else
              echo "postgres-secret already exists"
            fi
            
            echo "✅ Namespace and secrets configured"

      - name: Copy k8s manifests to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.K3S_HOST }}
          username: root
          key: ${{ secrets.K3S_SSH_KEY }}
          source: "k8s/*"
          target: "/tmp/orders-desk-deploy"

      - name: Apply Kubernetes manifests via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha }}
        with:
          host: ${{ secrets.K3S_HOST }}
          username: root
          key: ${{ secrets.K3S_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            echo "📦 Updating deployment with image: ${IMAGE_TAG}"
            
            # Update image in deployment manifest
            sed -i "s|image: ghcr.io/arttkach-ua/order-desk:latest|image: ${IMAGE_TAG}|g" /tmp/orders-desk-deploy/k8s/app-deployment.yaml
            
            # Apply all manifests
            echo "🔧 Applying Kubernetes manifests..."
            sudo k3s kubectl apply -f /tmp/orders-desk-deploy/k8s/postgres-pvc.yaml
            sudo k3s kubectl apply -f /tmp/orders-desk-deploy/k8s/postgres-deployment.yaml
            sudo k3s kubectl apply -f /tmp/orders-desk-deploy/k8s/postgres-service.yaml
            sudo k3s kubectl apply -f /tmp/orders-desk-deploy/k8s/app-configmap.yaml
            sudo k3s kubectl apply -f /tmp/orders-desk-deploy/k8s/app-deployment.yaml
            sudo k3s kubectl apply -f /tmp/orders-desk-deploy/k8s/app-service.yaml
            
            echo "⏳ Waiting for deployment to complete..."
            sudo k3s kubectl rollout status deployment/orders-app -n orders-desk --timeout=5m
            
            echo "📊 Deployment status:"
            sudo k3s kubectl get pods -n orders-desk
            sudo k3s kubectl get svc -n orders-desk
            
            # Cleanup
            rm -rf /tmp/orders-desk-deploy
            
            echo "✅ Deployment completed successfully!"

      - name: Get deployment info via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.K3S_HOST }}
          username: root
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            echo "🔍 Verifying deployment..."
            echo ""
            echo "📊 Pods Status:"
            sudo k3s kubectl get pods -n orders-desk -o wide
            echo ""
            echo "🌐 Services:"
            sudo k3s kubectl get svc -n orders-desk
            echo ""
            NODEPORT=$(sudo k3s kubectl get svc orders-service -n orders-desk -o jsonpath='{.spec.ports[0].nodePort}')
            echo "🌍 Application URL: http://${{ secrets.K3S_HOST }}:${NODEPORT}"
            echo "📚 Swagger UI: http://${{ secrets.K3S_HOST }}:${NODEPORT}/swagger-ui.html"

      - name: Deployment summary
        run: |
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.full_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Access URLs:**" >> $GITHUB_STEP_SUMMARY
          echo "- Application: http://${{ secrets.K3S_HOST }}:30080" >> $GITHUB_STEP_SUMMARY
          echo "- Swagger UI: http://${{ secrets.K3S_HOST }}:30080/swagger-ui.html" >> $GITHUB_STEP_SUMMARY
          echo "- Health Check: http://${{ secrets.K3S_HOST }}:30080/actuator/health" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Deployment Status:** SUCCESS" >> $GITHUB_STEP_SUMMARY

