name: Test

on:
  pull_request:
    branches: [ main, master, develop ]
  push:
    branches: [ main, master, develop ]
  issue_comment:
    types: [created]

jobs:
  test:
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    runs-on: ubuntu-latest
    steps:
      - name: Check comment trigger (skip if PR/push event)
        if: github.event_name == 'issue_comment'
        id: check
        run: |
          body="${{ github.event.comment.body }}"
          if echo "$body" | grep -i "run unit tests please" > /dev/null; then
            echo "trigger=true" >> $GITHUB_OUTPUT
          else
            echo "trigger=false" >> $GITHUB_OUTPUT
          fi
      - name: Stop if comment but not triggered
        if: github.event_name == 'issue_comment' && steps.check.outputs.trigger != 'true'
        run: exit 0
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request.head.sha || github.sha }}

      - name: Debug branch
        run: git branch --show-current
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Run tests with Gradle
        run: ./gradlew test
