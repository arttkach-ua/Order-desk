name: Build on Comment

on:
  issue_comment:
    types: [created]

jobs:
  build:
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest

    steps:
      - name: Check trigger
        id: check
        run: |
          body="${{ github.event.comment.body }}"
          if echo "$body" | grep -i "build this please" > /dev/null; then
            echo "trigger=true" >> $GITHUB_OUTPUT
          else
            echo "trigger=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if not triggered
        if: steps.check.outputs.trigger != 'true'
        run: exit 0

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.issue.pull_request.head.sha }}
          fetch-depth: 0

      - name: Debug branch
        run: git branch --show-current

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Fix gradlew (permissions + line endings)
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ls -la gradlew

      - name: Verify gradlew
        run: file gradlew

      - name: Build with Gradle (force safe mode)
        run: |
          chmod 777 gradlew
          sed -i 's/\r$//' gradlew
          sh gradlew build